# Tasuki Stack Profile: TypeScript + Next.js
# Convention database used by the onboard agent to populate agent templates.

stack:
  backend:
    lang: typescript
    framework: nextjs
    version_cmd: "node --version"
    run_cmd: "npm run dev"

  conventions:
    routing:
      - "Use App Router (`src/app/`) — not Pages Router"
      - "Server Components by default, `'use client'` only when needed"
      - "API routes in `src/app/api/` with `route.ts` files"
      - "Use `NextResponse.json()` for API responses"
      - "Auth via middleware (`middleware.ts`) or per-route checks"
      - "Use `next/navigation` for routing (`useRouter`, `redirect`)"
      - "Loading states via `loading.tsx`, errors via `error.tsx`"

    models:
      - "Use Prisma or Drizzle for database access"
      - "Define types in dedicated `types/` or `lib/types.ts`"
      - "Use Zod for runtime validation of API inputs"
      - "Always validate request bodies in API routes"
      - "Timestamps: `createdAt DateTime @default(now())` in Prisma"
      - "Use `@relation` with explicit `onDelete` in Prisma schemas"

    migrations:
      - "Use `npx prisma migrate dev` for development migrations"
      - "Use `npx prisma migrate deploy` for production"
      - "Never edit migration SQL files after they're applied"
      - "Use `npx prisma db push` only for prototyping"
      - "Always run `npx prisma generate` after schema changes"

    testing:
      - "Tests FIRST: Write failing tests before implementing"
      - "Use `vitest` for unit tests, `playwright` for E2E"
      - "Test API routes with direct function calls or `fetch`"
      - "Test Server Components with React Testing Library"
      - "Mock external services — never hit real APIs"
      - "Use MSW (Mock Service Worker) for API mocking"

    docker:
      - "Use `node:22-alpine` base image"
      - "Multi-stage build: deps -> build -> production"
      - "Use `npm ci --production` in final stage"
      - "Set `NEXT_TELEMETRY_DISABLED=1`"
      - "Health checks: `curl -f http://localhost:3000/api/health`"
