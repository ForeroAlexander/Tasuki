# Tasuki Stack Profile: Java + Spring Boot

stack:
  backend:
    lang: java
    framework: spring-boot
    version_cmd: "java --version"
    run_cmd: "./mvnw spring-boot:run"

  conventions:
    routing:
      - "Use `@RestController` with `@RequestMapping('/api/v1/resource')`"
      - "Method annotations: `@GetMapping`, `@PostMapping`, `@PutMapping`, `@DeleteMapping`"
      - "Auth via Spring Security: `@PreAuthorize('hasRole(ADMIN)')` or SecurityFilterChain"
      - "Request validation: `@Valid @RequestBody CreateUserRequest request`"
      - "Use `ResponseEntity<T>` for typed responses with status codes"
      - "Exception handling: `@ControllerAdvice` with `@ExceptionHandler`"
      - "Use SLF4J logging: `private static final Logger log = LoggerFactory.getLogger(X.class)`"

    models:
      - "JPA entities with `@Entity`, `@Table`, `@Id`, `@GeneratedValue`"
      - "Timestamps: `@CreatedDate` and `@LastModifiedDate` with `@EnableJpaAuditing`"
      - "Soft delete: `@Where(clause = 'deleted_at IS NULL')` with Hibernate filter"
      - "Relationships: `@ManyToOne(fetch = FetchType.LAZY)` — always lazy by default"
      - "Use Lombok: `@Data`, `@Builder`, `@NoArgsConstructor`, `@AllArgsConstructor`"
      - "DTOs separate from entities — never expose entities in API"

    migrations:
      - "Use Flyway: `V1__description.sql` files in `src/main/resources/db/migration/`"
      - "Or Liquibase: `changelog.xml` with changesets"
      - "Migrations run automatically on startup"
      - "Never modify applied migrations — create new ones"
      - "Use `IF NOT EXISTS` for idempotency"

    testing:
      - "Tests FIRST: Write failing tests before implementing"
      - "Use `@SpringBootTest` for integration tests with full context"
      - "Use `@WebMvcTest` for controller-only tests (faster)"
      - "Use `@DataJpaTest` for repository tests with embedded DB"
      - "Use Mockito: `@Mock`, `@InjectMocks`, `when().thenReturn()`"
      - "Use Testcontainers for real DB in integration tests"
      - "Test auth: 401 without token, 403 wrong role"

    docker:
      - "Multi-stage: build with Maven/Gradle, run with JRE only"
      - "Use `eclipse-temurin:21-jre-alpine` for runtime"
      - "Use `ENTRYPOINT ['java', '-jar', 'app.jar']`"
      - "Set JVM memory: `-Xmx512m -Xms256m`"
      - "Health checks: Spring Actuator `/actuator/health`"
