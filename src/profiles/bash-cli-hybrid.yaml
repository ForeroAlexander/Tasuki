# Tasuki Stack Profile: Bash + Python CLI hybrid
# For projects where the CLI and orchestration layer is bash,
# and algorithmic/data-processing logic is in Python modules.
# Example: Tasuki itself — bash dispatch + Python for graphs, state machines, RAG.

stack:
  backend:
    lang: bash
    framework: cli-hybrid
    version_cmd: "bash --version"
    run_cmd: "bash"

  conventions:
    routing:
      - "CLI entry point dispatches subcommands via case statements"
      - "Each subcommand maps to a sourced function, not a subprocess"
      - "Use `source \"$SCRIPT_DIR/module.sh\"` — never relative paths without resolution"
      - "All scripts start with `SCRIPT_DIR=\"$(cd \"$(dirname \"${BASH_SOURCE[0]}\")\" && pwd)\"`"
      - "Exit codes: 0 = success, 1 = error, 2 = blocked (hooks)"
      - "Use `log_info`, `log_error`, `log_success` from common.sh — never raw `echo` for user output"
      - "Arguments: use positional `$1`, `$2` — no getopt unless >3 flags"

    models:
      - "Data structures beyond key-value: use Python, not bash"
      - "Graphs, trees, BFS/DFS: always Python with proper data structures (deque, defaultdict)"
      - "JSON manipulation: use Python — grep-based JSON parsing is for extraction only, never mutation"
      - "State machines: Python with dict-based state, not bash variables"
      - "YAML parsing: bash `grep`/`sed` for simple reads, Python for complex structures"
      - "Python modules go in `src/engine/*.py` alongside the `.sh` files that call them"
      - "Every Python module has a docstring and `if __name__ == '__main__'` for CLI dispatch"

    migrations:
      - "No database migrations — this is a CLI tool"
      - "Config file format changes: handle backwards compatibility in the reader"
      - "Template changes: bump version, document in CONTEXT.md"

    testing:
      - "Tests in `tests/test-tasuki.sh` — single file, assert() function"
      - "Each assert: description + exit code check"
      - "Tests create mock projects in `mktemp -d`, never touch the real repo"
      - "Test isolation: each test group sets up its own fixtures"
      - "Test both detection AND onboard end-to-end (not just unit)"
      - "After refactors: run full suite, all tests must pass before committing"

    docker:
      - "No Docker — this is an npm-distributed CLI tool"
      - "Distribution via `npm i -g tasuki`"
      - "package.json `bin` field points to `bin/tasuki`"
      - "No native dependencies — bash + Python 3 (available on all dev machines)"

    frontend:
      - "Dashboard is a single HTML file generated by `dashboard.sh`"
      - "Inline CSS + JS — no build step, no npm dependencies for frontend"
      - "Chart.js and D3.js loaded from CDN"
      - "SSE for live updates, no WebSocket"
      - "Port 8686, binds 0.0.0.0 for WSL/SSH access"

    security:
      - "Never use `eval` in bash scripts"
      - "Python CLI args via `sys.argv`, never string interpolation from bash"
      - "No `set -x` in production hooks — leaks sensitive data"
      - "grep-based JSON parsing: always use `2>/dev/null` and `|| true` fallbacks"
      - "File paths from user input: always quote with double quotes"
      - "`grep -c` returns exit code 1 on zero matches — never use `$(grep -c ... || echo '0')`, use `$(grep -c ...) || var=0`"

    bash:
      - "`set -euo pipefail` in all engine scripts via common.sh"
      - "`set +e` / `set +o pipefail` in hooks and detectors where grep may legitimately return no matches"
      - "Associative arrays (`declare -A`) for structured data in bash"
      - "Functions: use `local` for all variables — no global pollution"
      - "Heredocs for inline templates only, never for >20 lines of Python — extract to .py files"
      - "Path resolution: `$(cd \"$(dirname \"${BASH_SOURCE[0]}\")\" && pwd)` at the top of every script"
      - "Subshells `$()`: beware `set -e` interaction — failed commands inside `$()` can be silent"
